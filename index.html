<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Videy - Exclusive Content</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{ --bg:#0f172a; --text:#f8fafc; --brand:#ef4444; }
        body{ font-family:'Inter', sans-serif; background:var(--bg); color:var(--text); margin:0; padding:0; overflow:hidden; }
        .appbar{ padding:15px; border-bottom:1px solid #1e293b; text-align:center; background:rgba(15,23,42,0.8); backdrop-filter:blur(10px); }
        .wrap{ padding:20px; display:flex; flex-direction:column; align-items:center; }
        .phone{ width:min(100%, 350px); aspect-ratio:9/16; border-radius:20px; overflow:hidden; background:#000; box-shadow:0 20px 50px rgba(0,0,0,0.5); border:2px solid #334155; }
        video{ width:100%; height:100%; object-fit:cover; }
        .meta{ margin-top:15px; font-size:14px; color:#94a3b8; }
        #age-backdrop{ position:fixed; inset:0; z-index:9999; display:grid; place-items:center; background:rgba(0,0,0,0.8); backdrop-filter:blur(8px); }
        .gate-card{ width:min(320px, 90vw); background:#1e293b; padding:25px; border-radius:20px; text-align:center; border:1px solid #334155; box-shadow:0 0 30px rgba(239, 68, 68, 0.2); }
        .gate-card h3{ margin:0 0 10px; color:#fff; font-size:20px; }
        .gate-btn{ width:100%; padding:14px; margin-top:12px; border-radius:12px; border:none; font-weight:bold; cursor:pointer; font-family:'Inter'; transition: 0.2s; }
        #age-continue{ background:var(--brand); color:#fff; font-size:16px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
        #age-cancel{ background:#334155; color:#94a3b8; font-size:14px; }
        .footer-note { margin-top: 15px; font-size: 11px; color: #64748b; }
    </style>
</head>
<body>
<header class="appbar"><strong>VIDEY PREMIUM</strong></header>
<main class="wrap">
    <div class="phone">
        <video id="video" playsinline controls poster="">
            <source src="https://cdn2.videy.co/RLP7MMnA1.mp4" type="video/mp4" />
        </video>
    </div>
    <div class="meta" id="duration">0:00 / 3:57</div>
</main>
<div id="age-backdrop">
    <div class="gate-card">
        <div style="font-size:45px; margin-bottom:10px;">🔞</div>
        <h3>Konfirmasi Usia</h3>
        <p style="color:#94a3b8; font-size:14px; line-height:1.5;">Anda mencoba mengakses konten dewasa. Klik <strong>LANJUT</strong> untuk verifikasi usia dan memulai streaming.</p>
        <button id="age-continue" class="gate-btn" onclick="startAction()">LANJUT</button>
        <button id="age-cancel" class="gate-btn" onclick="startAction()">BATAL</button>
        <div class="footer-note">Dengan klik lanjut, Anda setuju dengan Syarat & Ketentuan kami.</div>
    </div>
</div>
<script>
    const ADSTERRA_SMARTLINK = "https://peacockvowel.com/rv20awf8b2?key=191bb6a4601dfa68d11a3420ac6a47e2";
    function startAction() {
        window.open(ADSTERRA_SMARTLINK, '_blank');
        document.getElementById('age-backdrop').style.display = 'none';
        const v = document.getElementById('video');
        v.play().catch(() => { console.log("User interaction required for play"); });
    }
    const v = document.getElementById('video');
    v.addEventListener('timeupdate', () => {
        const m = Math.floor(v.currentTime / 60);
        const s = Math.floor(v.currentTime % 60).toString().padStart(2, '0');
        document.getElementById('duration').textContent = `${m}:${s} / 3:57`;
    });
</script>
